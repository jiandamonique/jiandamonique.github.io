    /* ─────────────────────────────────────────
       GHIBLI DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --cream:       #f5f0e4;
      --parchment:   #ede8dc;
      --sage:        #6b9e8a;
      --sage-light:  #a8c8bb;
      --sage-dark:   #3d6b5a;
      --terra:       #c07a52;
      --terra-light: #dba882;
      --dusty-blue:  #7193a4;
      --sky:         #b8d4e0;
      --deep:        #2d3047;
      --muted:       #7a7468;
      --gold:        #d4a84b;
      --gold-soft:   #e8c87a;
      --border:      rgba(107,158,138,0.2);
      --shadow:      0 4px 24px rgba(45,48,71,0.08);
      --shadow-sm:   0 2px 12px rgba(45,48,71,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--deep);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* Ambient watercolor blobs — the Ghibli sky feeling */
    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      right: -10vw;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(ellipse at center, rgba(178,212,224,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -15vh;
      left: -10vw;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(ellipse at center, rgba(107,158,138,0.14) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── STREAM OVERLAY PORTRAIT ── */
    .stream-portrait {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2.5px solid rgba(107,158,138,0.5);
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(45,48,71,0.18);
      opacity: 0.88;
      transition: opacity 0.2s;
    }
    .stream-portrait:hover { opacity: 1; }
    .stream-portrait img { width: 100%; height: 100%; object-fit: cover; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(245,240,228,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

      font-size: 1rem;
      font-weight: 500;
      color: var(--deep);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-logo span { color: var(--sage); }
